name: Harness Engineering Demo

# Manual trigger — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "Feature id for this run (e.g. PC-2-haspet)"
        required: true
        default: "PC-2-haspet"
      model:
        description: "Copilot model to use"
        required: true
        default: "gpt-5-mini"

permissions:
  contents: write        # commit the change + push the branch
  pull-requests: write   # open the PR

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Node (for Copilot CLI bundled by the SDK)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Install harness Python deps
        run: |
          python -m pip install --upgrade pip
          pip install github-copilot-sdk pyyaml

      - name: Seed harness workspace config (Linux mvnw)
        run: |
          mkdir -p spring-petclinic/.harness
          cat > spring-petclinic/.harness/config.yaml <<'YAML'
          test_command: "./mvnw test"
          test_filter: ""
          test_timeout: 1200
          pre_validation_command: "./mvnw spring-javaformat:apply"
          validation_loopback_phase: "coding"
          max_validation_retries: 3
          min_coverage: 90
          coverage_scope: "changed"
          coverage_loopback_phase: "unit_testing"
          max_coverage_retries: 2
          coverage_metric: "LINE"   # or "BRANCH" for stricter logic coverage
          coverage_command: "./mvnw jacoco:report"
          coverage_csv: "target/site/jacoco/jacoco.csv"
          story_file: "stories/current-story.md"
          model: "${{ github.event.inputs.model }}"
          phase_models:
            context: "gpt-5-mini"
            prompt_steps: "gpt-5-mini"
            coding: "gpt-5-mini"
            unit_testing: "gpt-5-mini"
            documentation: "gpt-5-mini"
            raise_pr: "gpt-5-mini"
          YAML
          chmod +x spring-petclinic/mvnw

      - name: Copilot auth smoke test
        working-directory: harness
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "token present: ${COPILOT_GITHUB_TOKEN:+yes}"
          # Report the TOKEN TYPE without leaking it: classic (ghp_) is silently
          # rejected by Copilot CLI; fine-grained (github_pat_) is required.
          case "$COPILOT_GITHUB_TOKEN" in
            ghp_*)        echo "token type: CLASSIC (ghp_) -> NOT SUPPORTED by Copilot CLI" ;;
            github_pat_*) echo "token type: fine-grained (github_pat_) -> OK type" ;;
            *)            echo "token type: UNKNOWN prefix" ;;
          esac
          copilot --version || true
          # SDK round-trip with EXPLICIT token (the reliable CI path)
          python - <<'PY'
          import asyncio, os
          from copilot import CopilotClient
          async def main():
              tok = (os.environ.get("COPILOT_GITHUB_TOKEN")
                     or os.environ.get("GH_TOKEN") or os.environ.get("GITHUB_TOKEN"))
              print("token resolved:", bool(tok), "| prefix:", (tok[:11] if tok else None))
              try:
                  async with CopilotClient(github_token=tok) as client:
                      models = await client.list_models()
                      print("models visible:", len(models))
                      for m in models[:8]:
                          print("  -", getattr(m, "id", m))
              except Exception as e:
                  print("SDK auth error:", type(e).__name__, str(e)[:250])
          asyncio.run(main())
          PY

      - name: Run the harness (all phases, auto-approve gates)
        working-directory: harness
        env:
          # CI auth: SDK detects COPILOT_GITHUB_TOKEN; the bundled CLI subprocess
          # also checks GH_TOKEN / GITHUB_TOKEN. Set all three so whichever the
          # child process reads, the token is there.
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          python run.py init --repo ../spring-petclinic --feature "${{ github.event.inputs.feature_id }}"
          python run.py autorun --repo ../spring-petclinic --model "${{ github.event.inputs.model }}"

      - name: Collect audit trail (always, even if halted)
        if: always()
        working-directory: harness
        run: |
          python run.py collect-audit --repo ../spring-petclinic || true

      - name: Upload harness artifacts (audit trail)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-workspace
          path: |
            spring-petclinic/.harness/**
            spring-petclinic/.github/story-context-files/**
            spring-petclinic/docs/**
            spring-petclinic/audit/**

      - name: Commit audit trail to repo (always — success OR halt)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          cd spring-petclinic
          FEATURE="${{ github.event.inputs.feature_id }}"
          # A dedicated audit branch per run, so the trail is ALWAYS retained in
          # the repo regardless of whether the harness completed or halted.
          AUDIT_BRANCH="harness-audit/${FEATURE}-${{ github.run_id }}"
          git config user.name "harness-bot"
          git config user.email "harness-bot@users.noreply.github.com"
          git checkout -b "$AUDIT_BRANCH"
          git add audit/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No audit files to commit (collect-audit produced nothing)."
          else
            # Read status from run-summary.json so the commit message states the
            # outcome and which phases are missing.
            STATUS=$(python3 -c "import json,glob,sys; \
              f=sorted(glob.glob('audit/*/run-summary.json')); \
              print(json.load(open(f[-1]))['status'] if f else 'unknown')" 2>/dev/null || echo unknown)
            git commit -m "Harness audit [$FEATURE] status=$STATUS (run ${{ github.run_id }})"
            git push origin "$AUDIT_BRANCH"
            echo "::notice title=Audit trail retained::Branch $AUDIT_BRANCH (status=$STATUS)"
          fi

      - name: Summarize what was retained and what's missing
        if: always()
        run: |
          echo "## Harness audit summary" >> "$GITHUB_STEP_SUMMARY"
          python3 harness/audit_summary.py spring-petclinic >> "$GITHUB_STEP_SUMMARY"

      - name: Open pull request with the change
        if: success()
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          cd spring-petclinic
          BRANCH="harness/${{ github.event.inputs.feature_id }}-${{ github.run_id }}"
          git config user.name "harness-bot"
          git config user.email "harness-bot@users.noreply.github.com"
          # Return to the checked-out commit first (the audit step may have left us
          # on the audit branch) so the code PR branches cleanly from the base.
          git checkout "${{ github.sha }}" 2>/dev/null || git checkout main
          git checkout -b "$BRANCH"
          # stage real source + docs + the committed audit trail (never the
          # gitignored .harness workspace itself)
          git add src/ docs/ audit/ 2>/dev/null || true
          git commit -m "Harness: ${{ github.event.inputs.feature_id }}" || echo "nothing to commit"
          git push origin "$BRANCH"
          gh pr create --title "Harness: ${{ github.event.inputs.feature_id }}" \
            --body-file .harness/pr-body.md --base main --head "$BRANCH" || \
            echo "PR creation skipped (check pr-body.md / branch state)"
